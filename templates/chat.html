<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medical Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="../static/style.css" />

</head>

<body>

    <div class="container-fluid h-100">

        <div class="row justify-content-center h-100">

            <div class="col-md-8 col-xl-6 chat">

                <div class="card">

                    <!-- HEADER -->
                    <div class="card-header msg_head">

                        <div class="d-flex align-items-center">

                            <div class="img_cont">

                                <img
                                    src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                                    class="user_img"
                                >

                                <span class="online_icon"></span>

                            </div>

                            <div class="user_info">

                                <span>Medical Chatbot</span>

                                <p>Ask me anything!</p>

                            </div>

                        </div>

                    </div>

                    <!-- CHAT BODY -->
                    <div id="messageFormeight" class="card-body msg_card_body">

                    </div>

                    <!-- FOOTER -->
                    <div class="card-footer">

                        <form id="messageArea" class="input-group">

                            <input
                                type="text"
                                id="text"
                                name="msg"
                                placeholder="Type your message..."
                                autocomplete="off"
                                class="form-control type_msg"
                                required
                            />

                            <div class="input-group-append">

                                <button
                                    type="submit"
                                    id="send"
                                    class="input-group-text send_btn"
                                >
                                    <i class="fas fa-location-arrow"></i>
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

    $(document).ready(function () {
        $("#messageArea").on("submit", function (event) {
            event.preventDefault();
            var rawText = $("#text").val().trim();
            // Prevent empty messages
            if (rawText === "") {
                return;
            }

            const date = new Date();

            const hour = date.getHours();
            const minute = date.getMinutes();

            const str_time = hour + ":" + minute;

            // USER MESSAGE

            var userHtml =
                '<div class="d-flex justify-content-end mb-4">' +
                    '<div class="msg_cotainer_send">' +
                        rawText +
                        '<span class="msg_time_send">' +
                            str_time +
                        '</span>' +
                    '</div>' +
                    '<div class="img_cont_msg">' +
                        '<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="user_img_msg">' +
                    '</div>' +
                '</div>';
            $("#text").val("");
            $("#messageFormeight").append(userHtml);

            // AUTO SCROLL

            $("#messageFormeight").scrollTop(
                $("#messageFormeight")[0].scrollHeight
            );

            // TYPING INDICATOR

            var typingHtml =

                '<div id="typing" class="d-flex justify-content-start mb-4">' +
                    '<div class="img_cont_msg">' +
                        '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img_msg">' +
                    '</div>' +
                    '<div class="msg_cotainer typing_animation">' +
                        'Typing...' +
                    '</div>' +
                '</div>';
            $("#messageFormeight").append(typingHtml);
            $("#messageFormeight").scrollTop(
                $("#messageFormeight")[0].scrollHeight
            );

            // API CALL

            fetch("http://127.0.0.1:8000/query", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    question: rawText
                })

            })

            .then(response => response.json())
            .then(data => {

                // REMOVE TYPING

                $("#typing").remove();

                // BOT MESSAGE

                var botHtml =

                    '<div class="d-flex justify-content-start mb-4">' +
                        '<div class="img_cont_msg">' +
                            '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img_msg">' +
                        '</div>' +
                        '<div class="msg_cotainer">' +
                            data.answer +
                            '<span class="msg_time">' +
                                str_time +
                            '</span>' +
                        '</div>' +
                    '</div>';
                $("#messageFormeight").append($.parseHTML(botHtml));

                // AUTO SCROLL

                $("#messageFormeight").scrollTop(
                    $("#messageFormeight")[0].scrollHeight
                );
            })

            .catch(error => {

                // REMOVE TYPING

                $("#typing").remove();
                console.error(error);
                var errorHtml =
                    '<div class="d-flex justify-content-start mb-4">' +
                        '<div class="msg_cotainer">' +
                            'Something went wrong. Please try again.' +
                        '</div>' +
                    '</div>';
                $("#messageFormeight").append(errorHtml);
            });
        });
    });
</script>
</body>
</html>
