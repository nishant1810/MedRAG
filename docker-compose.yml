services:

  backend:
    build: .
    container_name: medrag_backend

    ports:
      - "8000:8000"

    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_BASE_URL=http://ollama:11434

    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama_container

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

  nginx:
    image: nginx:latest
    container_name: medrag_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend

volumes:
  ollama_data: